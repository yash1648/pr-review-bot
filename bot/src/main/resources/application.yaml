# Application configuration for the GitHub PR Review Bot.
spring:
  application:
    name: bot

server:
  port: 8080
  servlet:
    context-path: /
  address: 0.0.0.0

logging:
  level:
    root: INFO
    com.bot.bot: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Actuator health endpoint
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# GitHub App Configuration
github:
  app-id: ${GITHUB_APP_ID:}
  client-id: ${GITHUB_CLIENT_ID:}
  webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
  private-key-path: ${GITHUB_PRIVATE_KEY_PATH:certs/private-key.pem}
  api-url: https://api.github.com

# LLM Configuration
llm:
  model: ${LLM_MODEL:qwen2.5-coder:7b}
  base-url: ${LLM_BASE_URL:http://localhost:11434}
  timeout-seconds: ${LLM_TIMEOUT_SECONDS:60}
  enabled: ${LLM_ENABLED:true}

# Application Configuration
app:
  heuristics-enabled: ${HEURISTICS_ENABLED:true}
  llm-enabled: ${LLM_ENABLED:true}
